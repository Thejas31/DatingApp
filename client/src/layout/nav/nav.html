<header
  class="items-center align-middle flex bg-linear-to-r p-3 fixed w-full top-0 from-primary to-black text-white"
>
  <a
    class="flex items-center align-middle"
    routerLink="/"
    routerLinkActive="text-accent"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="currentColor"
      class="size-10 ml-5"
    >
      <path
        d="M5.25 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM2.25 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM18.75 7.5a.75.75 0 0 0-1.5 0v2.25H15a.75.75 0 0 0 0 1.5h2.25v2.25a.75.75 0 0 0 1.5 0v-2.25H21a.75.75 0 0 0 0-1.5h-2.25V7.5Z"
      />
    </svg>
    <h1 class="font-bold text-2xl border-r-2 p-2 border-b-4">Dating App</h1>
  </a>

  <nav>
    <ul class="mx-3 flex gap-4 uppercase">
      <!-- <li><a routerLink="/" routerLinkActive="text-accent" class="cursor-pointer block py-2 px-1">Home</a></li> -->
      @if (loggedIn()) {
        <li>
          <a
            routerLink="/members"
            routerLinkActive="text-accent"
            class="cursor-pointer block py-2 px-1"
            >Members</a
          >
        </li>
        <li>
          <a
            routerLink="/messages"
            routerLinkActive="text-accent"
            class="cursor-pointer block py-2 px-1"
            >Messages</a
          >
        </li>
        <li>
          <a
            routerLink="/lists"
            routerLinkActive="text-accent"
            class="cursor-pointer block py-2 px-1"
            >Lists</a
          >
        </li>
      }
    </ul>
  </nav>

  @if (loggedIn()) {
    <div class="dropdown ml-auto dropdown-end mr-8">
      <div tabindex="0" role="button" class="flex cursor-pointer items-center align-middle gap-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="size-6"
        >
          <path
            fill-rule="evenodd"
            d="M18.685 19.097A9.723 9.723 0 0 0 21.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 0 0 3.065 7.097A9.716 9.716 0 0 0 12 21.75a9.716 9.716 0 0 0 6.685-2.653Zm-12.54-1.285A7.486 7.486 0 0 1 12 15a7.486 7.486 0 0 1 5.855 2.812A8.224 8.224 0 0 1 12 20.25a8.224 8.224 0 0 1-5.855-2.438ZM15.75 9a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
            clip-rule="evenodd"
          />
        </svg>
        <h3>{{ loggedIn()?.displayName || loggedIn()?.username || 'User' }}</h3>
      </div>
      <ul
        tabindex="-1"
        class="dropdown-content menu bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm"
      >
        <li><a>Edit User</a></li>
        <li><a (click)="logout()">Log Out</a></li>
      </ul>
    </div>
  } @else {
    <form
      #loginForm="ngForm"
      (ngSubmit)="login()"
      class="flex mx-3 ml-auto gap-2 align-middle items-end"
    >
      <input
        [(ngModel)]="cred.email"
        name="email"
        type="text"
        placeholder="Email"
        class="input input-sm input-bordered w-full max-w-xs"
      />
      <input
        [(ngModel)]="cred.password"
        name="password"
        type="password"
        placeholder="Password"
        class="input input-sm input-bordered w-full max-w-xs"
      />
      <button class="btn btn-soft btn-secondary" type="submit">Login</button>
    </form>
  }
</header>
