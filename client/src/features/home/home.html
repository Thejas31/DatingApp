@if (!registerMode()) {
  <div class=" item-center align-middle w flex-col">
    <div class="hero-content text-center ml-auto mr-auto">
      <div class="item-center flex flex-col align-middle m-auto mt-30">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="size-60 m-auto"
        >
          <path
            fill-rule="evenodd"
            d="M8.25 6.75a3.75 3.75 0 1 1 7.5 0 3.75 3.75 0 0 1-7.5 0ZM15.75 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM2.25 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM6.31 15.117A6.745 6.745 0 0 1 12 12a6.745 6.745 0 0 1 6.709 7.498.75.75 0 0 1-.372.568A12.696 12.696 0 0 1 12 21.75c-2.305 0-4.47-.612-6.337-1.684a.75.75 0 0 1-.372-.568 6.787 6.787 0 0 1 1.019-4.38Z"
            clip-rule="evenodd"
          />
          <path
            d="M5.082 14.254a8.287 8.287 0 0 0-1.308 5.135 9.687 9.687 0 0 1-1.764-.44l-.115-.04a.563.563 0 0 1-.373-.487l-.01-.121a3.75 3.75 0 0 1 3.57-4.047ZM20.226 19.389a8.287 8.287 0 0 0-1.308-5.135 3.75 3.75 0 0 1 3.57 4.047l-.01.121a.563.563 0 0 1-.373.486l-.115.04c-.567.2-1.156.349-1.764.441Z"
          />
        </svg>
        <h1 class="text-5xl font-bold">Welcome</h1>
        <p class="py-5 text-2xl">Register to get the access to the nearby matches....</p>
        <div class="flex gap-5 justify-center">
          <a class="btn btn-primary" (click)="openRegisterMode(true)">Register</a>
          <a class="btn btn-secondary">Login</a>
        </div>

        <!-- <select class="select w-full">
            <option disabled selected>Nearby Matches</option>
            @for(member of membersFromApp; track member.id) {
                <option>{{member.displayName}}</option>
            }
        </select> -->
      </div>
    </div>
  </div>
}@else {
    <p class="text-white text-2xl text-center items-center mt-30"> 
        <app-register 
       
        (cancelRegister)="openRegisterMode($event)"
        />
    </p>
}
